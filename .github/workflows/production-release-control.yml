name: Production release control

on:
  workflow_dispatch:
    inputs:
      action:
        description: Publish a chosen deployment or move back to a retained rollback target.
        required: true
        type: choice
        options:
          - publish
          - rollback
      target_deployment:
        description: Optional deployment URL or host. Required for publish; omitted rollback auto-selects the newest READY retained production deployment.
        required: false
        type: string
      expected_commit:
        description: Optional full commit SHA expected in Vercel deployment metadata.
        required: false
        type: string
      allow_dirty_target:
        description: Permit a target whose Vercel metadata reports gitDirty=1.
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: production-release-control
  cancel-in-progress: false

env:
  PRODUCTION_ALIAS: agent.bittrees.org
  VERCEL_PROJECT: agent
  VERCEL_SCOPE: bittrees-tech

jobs:
  release-control:
    name: Publish or rollback production alias
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install from the lockfile
        run: npm ci

      - name: Validate target selection and write plan
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          mkdir -p output/production-release-control
          node scripts/production-alias-control.mjs \
            --action=${{ github.event.inputs.action }} \
            ${{ github.event.inputs.target_deployment != '' && format('--target={0}', github.event.inputs.target_deployment) || '' }} \
            ${{ github.event.inputs.expected_commit != '' && format('--expected-commit={0}', github.event.inputs.expected_commit) || '' }} \
            ${{ github.event.inputs.allow_dirty_target == 'true' && '--allow-dirty-target' || '' }} \
            --summary-file=output/production-release-control/alias-plan.json

      - name: Move the production alias
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          node scripts/production-alias-control.mjs \
            --action=${{ github.event.inputs.action }} \
            ${{ github.event.inputs.target_deployment != '' && format('--target={0}', github.event.inputs.target_deployment) || '' }} \
            ${{ github.event.inputs.expected_commit != '' && format('--expected-commit={0}', github.event.inputs.expected_commit) || '' }} \
            ${{ github.event.inputs.allow_dirty_target == 'true' && '--allow-dirty-target' || '' }} \
            --apply \
            --confirm-alias=${PRODUCTION_ALIAS} \
            --summary-file=output/production-release-control/alias-result.json

      - name: Verify live production health and contract after alias move
        env:
          EXPECTED_RELEASE_COMMIT: ${{ github.event.inputs.expected_commit }}
        run: |
          npm run health -- --base-url=https://${PRODUCTION_ALIAS} \
            ${{ github.event.inputs.expected_commit != '' && format('--expected-release-commit={0}', github.event.inputs.expected_commit) || '' }} \
            --summary-file=output/production-release-control/post-release-health.json
          npm run smoke -- --base-url=https://${PRODUCTION_ALIAS}

      - name: Upload release-control evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-release-control-${{ github.run_id }}
          path: output/production-release-control
          if-no-files-found: warn
          retention-days: 30
